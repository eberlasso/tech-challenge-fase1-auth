spring:
  application:
    name: user-authentication-service
  docker:
    compose:
      enabled: false
  cloud:
    config:
      enabled: false

  datasource:
    driver-class-name: org.postgresql.Driver
    # Conecta no serviço do banco pelo nome definido no compose
    url: jdbc:postgresql://postgres-db:5432/db_restaurant_auth
    username: usr_auth_service
    # O Spring busca a variável DB_PASSWORD injetada pelo Compose
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      # 'update' para criar as tabelas automaticamente no ambiente do professor
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: false

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

logging:
  level:
    org.hibernate.SQL: DEBUG